# gsx project config, shared by every example module in this repo.
#
# Registers the structpages URL/ID helpers as gsx pipeline filters so templates
# can write `{ page{} |> url }`, `{ x |> id }`, `{ x |> target }` instead of the
# ctx-threading, error-returning structpages.URLFor / ID / IDTarget calls.
#
# The stock `gsx` binary discovers this file by walking up from the example dir
# to the git repo root, so no per-example cmd/gen generator is needed. Generate
# with:  go tool gsx generate .
[aliases]
url    = "github.com/jackielii/structpages.URLFor"
id     = "github.com/jackielii/structpages.ID"
target = "github.com/jackielii/structpages.IDTarget"
